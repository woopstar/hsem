repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: lint
        name: Format and lint (isort + black + ruff)
        language: system
        entry: tox
        args: [-e, lint]
        pass_filenames: false
        always_run: true

      - id: typing
        name: Type check (mypy)
        language: system
        entry: tox
        args: [-e, typing]
        pass_filenames: false
        always_run: true

      - id: quality
        name: Quality checks (pyright + vulture)
        language: system
        entry: tox
        args: [-e, quality]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format with Prettier
        types_or: [markdown, yaml, json]
        exclude: "^custom_components/.*\\.json$|^translations/.*"
