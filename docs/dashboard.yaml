views:
  - title: HSEM
    badges: []
    sections:
      # ═══════════════════════════════════════════════════════════
      # SECTION 1 — SYSTEM STATUS OVERVIEW
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: System Status
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: tile
            entity: sensor.hsem_degraded_mode_sensor
            name: System Health
            icon: mdi:heart-pulse
            vertical: false
            hide_state: false
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_workingmode_sensor
            name: Working Mode
            icon: mdi:chart-timeline-variant
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_force_mode_sensor
            name: Force Mode
            icon: mdi:hand-pointing-right
            vertical: false
            hide_state: false
            grid_options:
              columns: 2
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_read_only_sensor
            name: Read-Only
            icon: mdi:lock
            vertical: false
            hide_state: false
            grid_options:
              columns: 2
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_hardware_writes_sensor
            name: HW Writes
            icon: mdi:pencil
            vertical: false
            hide_state: false
            grid_options:
              columns: 2
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_applier_status_sensor
            name: Inverter Apply
            icon: mdi:swap-horizontal
            vertical: false
            hide_state: false
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_missing_entities_sensor
            name: Missing Inputs
            icon: mdi:alert-circle-outline
            vertical: false
            hide_state: false
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_ev_charging_sensor
            name: EV Charging Active
            icon: mdi:ev-station
            vertical: false
            hide_state: false
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'degraded_mode') }}"
            secondary: Degraded Mode
            icon: mdi:alert
            icon_color: >
              {% set d = state_attr('sensor.hsem_workingmode_sensor', 'degraded_mode') %}
              {% if d == 'ok' %}green{% elif d == 'degraded' %}orange{% else %}red{% endif %}
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'batteries_current_capacity') }} kWh"
            secondary: "Current / Usable: {{ state_attr('sensor.hsem_workingmode_sensor', 'batteries_usable_capacity') }} kWh"
            icon: mdi:battery
            icon_color: yellow
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'net_consumption') }} W"
            secondary: "Solar: {{ state_attr('sensor.hsem_workingmode_sensor', 'solar_production_power_state') }} W"
            icon: mdi:transmission-tower
            icon_color: blue
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'import_electricity_price_state') }}"
            secondary: "Import / Export: {{ state_attr('sensor.hsem_workingmode_sensor', 'export_electricity_price_state') }}"
            icon: mdi:currency-eur
            icon_color: green
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
        column_span: 2

      # ═══════════════════════════════════════════════════════════
      # SECTION 2 — WORKING MODE TIMELINE (48h)
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: Working Mode Timeline (48h)
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: custom:apexcharts-card
            update_interval: 5m
            experimental:
              disable_config_validation: true
            grid_options:
              columns: full
            graph_span: 48h
            span:
              start: day
            now:
              show: true
              color: red
              label: Now
            apex_config:
              chart:
                height: 160
              stroke:
                curve: stepline
              legend:
                show: true
                position: bottom
                fontSize: 11px
              xaxis:
                labels:
                  format: HH
                  rotate: -45
                  rotateAlways: true
                  hideOverlappingLabels: true
                  style:
                    fontSize: 10
                    fontWeight: 500
              yaxis:
                show: false
                min: 0
                max: 1
                tickAmount: 1
            series:
              - name: Charge From Grid
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'batteries_charge_grid' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#ef4444"
              - name: Charge From Solar
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'batteries_charge_solar' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#22c55e"
              - name: Discharge
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'batteries_discharge_mode' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#f97316"
              - name: Wait
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'batteries_wait_mode' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#8b5cf6"
              - name: EV Smart Charging
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'ev_smart_charging' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#06b6d4"
              - name: Force Discharge
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'force_batteries_discharge' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#ec4899"
              - name: Time Passed
                entity: sensor.hsem_workingmode_sensor
                attribute: hourly_recommendations
                type: area
                opacity: 1
                show:
                  legend_value: false
                data_generator: >
                  const rows =
                  (Array.isArray(entity.attributes.hourly_recommendations) ?
                  entity.attributes.hourly_recommendations : [])
                    .slice()
                    .sort((a,b) => new Date(a.start) - new Date(b.start));
                  const out = []; rows.forEach(({ start, end, recommendation })
                  => {
                    const s = new Date(start).getTime();
                    const e = new Date(end).getTime();
                    const on = recommendation === 'time_passed' ? 1 : null;
                    out.push([s, on], [e, on]);
                  }); return out;
                color: "#64748b"
        column_span: 2

      # ═══════════════════════════════════════════════════════════
      # SECTION 3 — PLANNING & INTELLIGENCE
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: Planning & Intelligence
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: tile
            entity: sensor.hsem_plan_explanation_sensor
            name: Plan Strategy
            icon: mdi:brain
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_forecast_accuracy_sensor
            name: Forecast Accuracy
            icon: mdi:chart-line
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.daily_plan_vs_actual
            name: Plan vs Actual
            icon: mdi:scale-balance
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_next_update_sensor
            name: Next Update
            icon: mdi:timer-sand
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_last_updated_sensor
            name: Last Updated
            icon: mdi:clock-check
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_update_interval_sensor
            name: Update Interval
            icon: mdi:timer-sync
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.hsem_recommendation_interval_sensor
            name: Recomm. Interval
            icon: mdi:timer-music
            vertical: false
            hide_state: false
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "Spread: {{ state_attr('sensor.hsem_plan_explanation_sensor', 'price_spread') }}"
            secondary: "Peak: {{ state_attr('sensor.hsem_plan_explanation_sensor', 'peak_import_price') }} / Off: {{ state_attr('sensor.hsem_plan_explanation_sensor', 'off_peak_import_price') }}"
            icon: mdi:swap-horizontal-bold
            icon_color: >
              {% set s = state_attr('sensor.hsem_plan_explanation_sensor', 'price_spread') | float(0) %}
              {% if s > 0.01 %}green{% else %}grey{% endif %}
            grid_options:
              columns: 4
              rows: 1
            tap_action:
              action: more-info
          - type: custom:apexcharts-card
            update_interval: 5m
            experimental:
              disable_config_validation: true
            header:
              show: true
              title: Rejected Plans — Costs
            graph_span: 48h
            apex_config:
              chart:
                height: 200
              legend:
                show: true
                position: bottom
                fontSize: 11px
              xaxis:
                type: category
                labels:
                  style:
                    fontSize: 10
              yaxis:
                decimalsInFloat: 4
                title:
                  text: Currency
              plotOptions:
                bar:
                  horizontal: true
            series:
              - name: Total Cost
                entity: sensor.hsem_plan_explanation_sensor
                attribute: rejected_plans
                type: bar
                color: "#8b5cf6"
                float_precision: 4
                show:
                  legend_value: false
                data_generator: >
                  const plans = Array.isArray(entity.attributes.rejected_plans) ?
                    entity.attributes.rejected_plans : [];
                  const out = [];
                  plans.forEach(p => {
                    if (p.estimated_cost !== undefined) out.push({x: p.name, y: p.estimated_cost});
                  });
                  return out;
              - name: Score (lower=better)
                entity: sensor.hsem_plan_explanation_sensor
                attribute: rejected_plans
                type: bar
                color: "#f97316"
                float_precision: 4
                show:
                  legend_value: false
                data_generator: >
                  const plans = Array.isArray(entity.attributes.rejected_plans) ?
                    entity.attributes.rejected_plans : [];
                  const out = [];
                  plans.forEach(p => {
                    if (p.score !== undefined) out.push({x: p.name, y: p.score});
                  });
                  return out;
            grid_options:
              columns: full
              rows: 1
        column_span: 2

      # ═══════════════════════════════════════════════════════════
      # SECTION 4b — DAILY PLAN vs ACTUAL HISTORY
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: Daily Plan vs Actual — 30 Day History
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: custom:apexcharts-card
            update_interval: 5m
            header:
              show: true
              title: Net Cost per Day — Last 30 Days
            graph_span: 30d
            apex_config:
              chart:
                height: 220
              stroke:
                curve: stepline
                width: 1
              markers:
                size: 3
              legend:
                show: true
                position: bottom
                fontSize: 11px
              xaxis:
                type: datetime
                labels:
                  format: dd MMM
                  datetimeUTC: false
                  rotate: -45
                  rotateAlways: true
                  hideOverlappingLabels: true
                  style:
                    fontSize: 10
              yaxis:
                decimalsInFloat: 2
                title:
                  text: Currency
            series:
              - name: Plan
                entity: sensor.daily_plan_vs_actual
                attribute: history
                type: line
                color: "#3b82f6"
                float_precision: 2
                show:
                  legend_value: false
                data_generator: >
                  const days = Array.isArray(entity.attributes.history) ?
                    entity.attributes.history.slice().reverse() : [];
                  const out = [];
                  days.forEach(d => {
                    if (!d || !d.plan || !d.date) return;
                    const ts = new Date(d.date + 'T12:00:00').getTime();
                    const planNet = (d.plan.grid_import_cost || 0) - (d.plan.grid_export_rev || 0);
                    out.push([ts, planNet]);
                  });
                  return out;
              - name: Actual
                entity: sensor.daily_plan_vs_actual
                attribute: history
                type: line
                color: "#f97316"
                float_precision: 2
                show:
                  legend_value: false
                data_generator: >
                  const days = Array.isArray(entity.attributes.history) ?
                    entity.attributes.history.slice().reverse() : [];
                  const out = [];
                  days.forEach(d => {
                    if (!d || !d.actual || !d.date) return;
                    const ts = new Date(d.date + 'T12:00:00').getTime();
                    const actualNet = (d.actual.grid_import_cost || 0) - (d.actual.grid_export_rev || 0);
                    out.push([ts, actualNet]);
                  });
                  return out;
              - name: Diff
                entity: sensor.daily_plan_vs_actual
                attribute: history
                type: column
                color: "#22c55e"
                float_precision: 2
                opacity: 0.6
                show:
                  legend_value: true
                data_generator: >
                  const days = Array.isArray(entity.attributes.history) ?
                    entity.attributes.history.slice().reverse() : [];
                  const out = [];
                  days.forEach(d => {
                    if (!d || !d.plan || !d.actual || !d.date) return;
                    const ts = new Date(d.date + 'T12:00:00').getTime();
                    const planNet = (d.plan.grid_import_cost || 0) - (d.plan.grid_export_rev || 0);
                    const actualNet = (d.actual.grid_import_cost || 0) - (d.actual.grid_export_rev || 0);
                    out.push([ts, actualNet - planNet]);
                  });
                  return out;
          - type: custom:mushroom-template-card
            primary: "Today: {{ state_attr('sensor.daily_plan_vs_actual', 'today').actual.grid_import_cost }} / {{ state_attr('sensor.daily_plan_vs_actual', 'today').plan.grid_import_cost }}"
            secondary: "Actual/Plan Import Cost"
            icon: mdi:currency-eur
            icon_color: blue
            grid_options:
              columns: 6
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.daily_plan_vs_actual', 'history') | length }} days"
            secondary: "History Window"
            icon: mdi:calendar-range
            icon_color: purple
            grid_options:
              columns: 6
              rows: 1
            tap_action:
              action: more-info
        column_span: 2

      # ═══════════════════════════════════════════════════════════
      # SECTION 4c — FORECAST ACCURACY INSIGHTS
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: PV & Load Forecast Accuracy
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: custom:mushroom-template-card
            primary: "PV MAE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'mae_pv_kwh') }} kWh"
            secondary: "RMSE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'rmse_pv_kwh') }} kWh"
            icon: mdi:solar-power
            icon_color: orange
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "PV Bias: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'bias_pv_kwh') }} kWh"
            secondary: "MAPE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'mape_pv_pct') }}%"
            icon: mdi:chart-bell-curve
            icon_color: >
              {% set b = state_attr('sensor.hsem_forecast_accuracy_sensor', 'bias_pv_kwh') | float(0) %}
              {% if b | abs < 0.1 %}green{% elif b > 0 %}orange{% else %}blue{% endif %}
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "Load MAE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'mae_load_kwh') }} kWh"
            secondary: "RMSE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'rmse_load_kwh') }} kWh"
            icon: mdi:home-lightning-bolt
            icon_color: blue
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "Load Bias: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'bias_load_kwh') }} kWh"
            secondary: "MAPE: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'mape_load_pct') }}%"
            icon: mdi:chart-bell-curve
            icon_color: >
              {% set b = state_attr('sensor.hsem_forecast_accuracy_sensor', 'bias_load_kwh') | float(0) %}
              {% if b | abs < 0.1 %}green{% elif b > 0 %}orange{% else %}blue{% endif %}
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "Slots: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'finalised_slots') }}"
            secondary: "Window: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'window_slots') }}"
            icon: mdi:counter
            icon_color: grey
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: >
              PV: {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'latest_pv_forecast_kwh') }} &rarr;
              {{ state_attr('sensor.hsem_forecast_accuracy_sensor', 'latest_pv_actual_kwh') }} kWh
            secondary: "Latest Slot (Forecast &rarr; Actual)"
            icon: mdi:swap-horizontal
            icon_color: yellow
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
        column_span: 2

      # ═══════════════════════════════════════════════════════════
      # SECTION 4d — LIVE POWER FLOW
      # ═══════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: heading
            heading: Live Power Flow
            heading_style: title
            grid_options:
              columns: full
              rows: 1
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'solar_production_power_state') }} W"
            secondary: Solar Production
            icon: mdi:solar-power
            icon_color: orange
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'house_consumption_power_state') }} W"
            secondary: House Consumption
            icon: mdi:home-lightning-bolt
            icon_color: blue
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'net_consumption') }} W"
            secondary: Net (Grid) Consumption
            icon: mdi:transmission-tower
            icon_color: >
              {% set n = state_attr('sensor.hsem_workingmode_sensor', 'net_consumption') | float(0) %}
              {% if n > 0 %}red{% else %}green{% endif %}
            grid_options:
              columns: 3
              rows: 1
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.hsem_workingmode_sensor', 'net_consumption_with_ev') }} W"
            secondary: Net (incl. EV)
            icon: mdi:ev-station
            icon_color: >
              {% set n = state_attr('sensor.hsem_workingmode_sensor', 'net_consumption_with_ev') | float(0) %}
