[tox]
envlist = py313, lint, typing, format
skip_missing_interpreters = True

[gh-actions]
python =
    3.13: py313, lint, typing, format

[testenv]
basepython = python3.13
deps =
    -r{toxinidir}/requirements_test.txt
commands =
    pytest tests/ --timeout=30 --cov=custom_components.hsem --cov-report=xml {posargs}
    coverage report

[testenv:lint]
basepython = python3.13
description = Lint and check code quality with ruff
deps =
    -r{toxinidir}/requirements_lint.txt
commands =
    ruff check . {posargs}

[testenv:format]
basepython = python3.13
description = Format code with ruff
deps =
    -r{toxinidir}/requirements_lint.txt
commands =
    ruff format . --check {posargs}

[testenv:typing]
basepython = python3.13
description = Type check with mypy
deps =
    -r{toxinidir}/requirements_typing.txt
commands =
    mypy custom_components tests

[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
