name: Lint and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions: read-all

jobs:
  lint:
    name: Lint with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-lint-${{ hashFiles('requirements.txt', 'requirements_lint.txt') }}
          restore-keys: |
            tox-lint-

      - name: Install tox
        run: python -m pip install tox

      - name: Format and lint with tox
        run: tox -e lint

  type-check:
    name: Type check with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-typing-${{ hashFiles('requirements.txt', 'requirements_typing.txt') }}
          restore-keys: |
            tox-typing-

      - name: Install tox
        run: python -m pip install tox

      - name: Type check with tox
        run: tox -e typing

  quality:
    name: Static quality checks with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-quality-${{ hashFiles('requirements.txt', 'requirements_test.txt') }}
          restore-keys: |
            tox-quality-

      - name: Install tox
        run: python -m pip install tox

      - name: Run quality checks with tox
        run: tox -e quality

  tests:
    name: Tests with tox (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-test-${{ hashFiles('requirements.txt', 'requirements_test.txt') }}
          restore-keys: |
            tox-test-

      - name: Install tox
        run: python -m pip install tox

      - name: Run tests with tox
        run: tox -e py313

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
