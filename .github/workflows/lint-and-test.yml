name: Lint and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions: read-all

jobs:
  lint:
    name: Lint with isort, black, and ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('**/requirements_lint.txt') }}
          restore-keys: |
            pip-lint-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
          pip install -r requirements_lint.txt

      - name: Format and lint with tox
        run: tox -e lint

  type-check:
    name: Type check with mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-typing-${{ hashFiles('**/requirements.txt', '**/requirements_typing.txt') }}
          restore-keys: |
            pip-typing-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_typing.txt

      - name: Type check with mypy
        run: mypy custom_components tests
        continue-on-error: true  # TODO: fix mypy errors before enforcing

  quality:
    name: Static quality checks (Pyright + Vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-quality-${{ hashFiles('**/requirements.txt', '**/requirements_test.txt') }}
          restore-keys: |
            pip-quality-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_test.txt

      - name: Run Pyright type checker
        run: python -m pyright
        continue-on-error: true  # Staged: informational until baseline is clean

      - name: Run Vulture dead-code detector
        run: python -m vulture custom_components/hsem tests vulture_whitelist.py --min-confidence 80
        continue-on-error: true  # Staged: informational until baseline is clean

  tests:
    name: Tests with pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('**/requirements.txt', '**/requirements_test.txt') }}
          restore-keys: |
            pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_test.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ --timeout=30 --cov=custom_components.hsem --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
