name: Lint and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: uv pip install --system --only-binary :all: tox==4.55.1 tox-uv==1.35.2

      - name: Format and lint with tox
        run: tox -e lint

  type-check:
    name: Type check with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: uv pip install --system --only-binary :all: tox==4.55.1 tox-uv==1.35.2

      - name: Type check with tox
        run: tox -e typing

  quality:
    name: Static quality checks with tox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: uv pip install --system --only-binary :all: tox==4.55.1 tox-uv==1.35.2

      - name: Run quality checks with tox
        run: tox -e quality

  tests:
    name: Tests with tox (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: uv pip install --system --only-binary :all: tox==4.55.1 tox-uv==1.35.2

      - name: Run tests with tox
        run: tox -e py314

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.14'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
