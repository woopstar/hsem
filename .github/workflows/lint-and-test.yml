name: Lint and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  checks:
    name: Tox checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: uv pip install --system tox==4.55.1 tox-uv==1.35.2

      - name: Run all checks in parallel
        run: tox run-parallel

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
