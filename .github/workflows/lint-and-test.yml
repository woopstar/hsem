name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  lint:
    name: Lint with tox
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v6
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: python -m pip install --only-binary ':all:' tox==4.55.1 tox-uv==1.35.2

      - name: Format and lint with tox
        run: tox -e lint

  type-check:
    name: Type check with tox
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v6
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: python -m pip install --only-binary ':all:' tox==4.55.1 tox-uv==1.35.2

      - name: Type check with tox
        run: tox -e typing

  quality:
    name: Static quality checks with tox
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v6
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: python -m pip install --only-binary ':all:' tox==4.55.1 tox-uv==1.35.2

      - name: Run quality checks with tox
        run: tox -e quality

  tests:
    name: Tests with tox
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Cache tox environments
        uses: actions/cache@v6
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            tox-${{ runner.os }}-

      - name: Install tox with uv support
        run: python -m pip install --only-binary ':all:' tox==4.55.1 tox-uv==1.35.2

      - name: Run tests with tox
        run: |
          tox -e py314 || true

      - name: Verify tests passed
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Tests failed — no coverage report generated"
            exit 1
          fi
          # Parse junit XML for failures (bypasses tox signal propagation).
          FAILURES=$(grep -oP 'failures="\K\d+' test-results.xml || echo "1")
          ERRORS=$(grep -oP 'errors="\K\d+' test-results.xml || echo "1")
          if [ "$FAILURES" != "0" ] || [ "$ERRORS" != "0" ]; then
            echo "Tests had failures=$FAILURES errors=$ERRORS"
            exit 1
          fi
          echo "All tests passed (failures=$FAILURES errors=$ERRORS)"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./coverage.xml
          retention-days: 1

  codecov:
    name: Upload coverage to Codecov
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
