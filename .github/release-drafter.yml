name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- #$NUMBER $TITLE @$AUTHOR'
sort-direction: ascending
exclude-labels:
  - 'skip-changelog'
categories:
  - title: '⚒️ Breaking Changes'
    labels:
      - 'breaking-change'

  - title: '🚀 Features'
    labels:
      - 'enhancement'

  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'bug-fix'

  - title: '📖 Documentation'
    labels:
      - 'documentation'

  - title: '🔧 Configuration'
    labels:
      - 'config'

  - title: '🏗️ Build & CI'
    labels:
      - 'build'

  - title: '🧰 Maintenance'
    labels:
      - 'chore'

  - title: '📦 Dependencies'
    labels:
      - 'dependencies'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: 'bug'
    branch:
      - '/fix\/.+/'
  - label: 'enhancement'
    branch:
      - '/feat\/.+/'
      - '/feature\/.+/'
  - label: 'breaking-change'
    branch:
      - '/breaking\/.+/'
  - label: 'documentation'
    branch:
      - '/docs\/.+/'
  - label: 'chore'
    branch:
      - '/chore\/.+/'
  - label: 'build'
    branch:
      - '/build\/.+/'
      - '/ci\/.+/'
  - label: 'dependencies'
    branch:
      - '/deps\/.+/'
